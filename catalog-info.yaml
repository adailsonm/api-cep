apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: api-cep
  description: API simples em FastAPI para consulta de CEP
  tags:
    - api
    - fastapi
    - python
    - rest
    - experimental
  
  annotations:
    github.com/project-slug: "adailsonm/api-cep"
    backstage.io/techdocs-ref: dir:.
  
  links:
    - url: https://github.com/adailsonm/api-cep
      title: GitHub Repository
      icon: github
    - url: http://localhost:3000/api-docs
      title: API Docs (Backstage)
      icon: docs
    - url: http://localhost:8000/docs
      title: Swagger UI (FastAPI)
      icon: docs
spec:
  type: service
  lifecycle: experimental
  owner: group:default/team-cep
  providesApis:
    - api-cep
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: viacep-api
  description: API externa ViaCEP para Consulta de CEPs Brasileiros
  tags:
    - external
    - api
    - third-party
  links:
    - url: https://viacep.com.br/
      title: ViaCEP Website
      icon: website

    - url: https://viacep.com.br/ws/01001000/json/
      title: ViaCEP API Example
      icon: docs
spec:
  type: external-api
  owner: group:default/team-cep
  dependencyOf:
    - component:default/api-cep
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: api-cep
  description: API para Consulta de CEP usando ViaCEP
  tags:
    - rest
    - openapi
    - cep
spec:
  type: openapi
  lifecycle: experimental
  owner: user:default/guest
  system: api-cep
  definition:
    $text: ./openapi.yaml