apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: api-cep
  description: API simples em FastAPI para consulta de CEP
  tags:
    - api
    - fastapi
    - python
    - rest
    - experimental
  
  annotations:
    github.com/project-slug: "adailsonm/api-cep"
  
  links:
    - url: https://github.com/adailsonm/api-cep
