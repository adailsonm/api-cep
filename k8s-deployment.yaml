apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-cep-deployment
  labels:
    backstage.io/kubernetes-id: api-cep  # ← Deve bater com annotation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-cep
  template:
    metadata:
      labels:
        app: api-cep
        backstage.io/kubernetes-id: api-cep  # ← OBRIGATÓRIO
    spec:
      containers:
      - name: app
        image: iesodias/api-cep:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-cep-service
  labels:
    backstage.io/kubernetes-id: api-cep  # ← Deve bater com annotation
spec:
  selector:
    app: api-cep
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP